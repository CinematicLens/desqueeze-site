<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeSqueeze Studio Ecosystem Board</title>
  <desc id="desc">Premium ecosystem board showing flagship CineLutLiveGrade and connected product lines.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f5ea"/>
      <stop offset="100%" stop-color="#eef3f7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="heroClip"><rect x="74" y="220" width="620" height="560" rx="22"/></clipPath>
    <clipPath id="webClip"><rect x="760" y="240" width="360" height="240" rx="18"/></clipPath>
    <clipPath id="iosClip"><rect x="1140" y="240" width="386" height="240" rx="18"/></clipPath>
    <clipPath id="androidClip"><rect x="760" y="500" width="360" height="240" rx="18"/></clipPath>
    <clipPath id="winClip"><rect x="1140" y="500" width="386" height="240" rx="18"/></clipPath>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1420" cy="120" r="180" fill="#00bcd4" opacity=".14" filter="url(#soft)"/>
  <circle cx="220" cy="120" r="120" fill="#0ea5e9" opacity=".1" filter="url(#soft)"/>

  <text x="74" y="102" fill="#0b0f14" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="50" font-weight="700">
    DeSqueeze Studio Ecosystem
  </text>
  <text x="74" y="146" fill="#155e75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="500">
    CineLutLiveGrade flagship + complete production toolchain
  </text>

  <!-- Flagship block -->
  <rect x="74" y="220" width="620" height="560" rx="22" fill="#0b0f14"/>
  <g clip-path="url(#heroClip)">
    <image href="hero-desqueeze-studio.png" x="74" y="220" width="620" height="360" preserveAspectRatio="xMidYMid slice"/>
    <rect x="74" y="220" width="620" height="360" fill="#0b0f14" opacity=".24"/>
  </g>
  <rect x="74" y="560" width="620" height="220" rx="0" fill="#0b0f14"/>
  <text x="106" y="618" fill="#67e8f9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Flagship</text>
  <text x="106" y="660" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">CineLutLiveGrade</text>
  <text x="106" y="700" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">
    Live LUT and CDL grading. Scopes, ProRes, dailies handoff.
  </text>
  <rect x="106" y="726" width="320" height="7" rx="3.5" fill="url(#accent)"/>

  <!-- Right grid cards -->
  <rect x="760" y="240" width="360" height="240" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <g clip-path="url(#webClip)">
    <image href="import-export-ui.png" x="760" y="240" width="360" height="180" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <text x="786" y="452" fill="#0b0f14" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Web Studio</text>

  <rect x="1140" y="240" width="386" height="240" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <g clip-path="url(#iosClip)">
    <image href="product-ios.png" x="1140" y="240" width="386" height="180" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <text x="1166" y="452" fill="#0b0f14" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">iOS App</text>

  <rect x="760" y="500" width="360" height="240" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <g clip-path="url(#androidClip)">
    <image href="product-android.png" x="760" y="500" width="360" height="180" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <text x="786" y="712" fill="#0b0f14" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Android Apps</text>

  <rect x="1140" y="500" width="386" height="240" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <g clip-path="url(#winClip)">
    <image href="product-windows.png" x="1140" y="500" width="386" height="180" preserveAspectRatio="xMidYMid slice"/>
  </g>
  <text x="1166" y="712" fill="#0b0f14" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Windows Pro</text>

  <text x="760" y="805" fill="#155e75" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">
    One workflow: Capture -> Grade -> Desqueeze -> Deliver
  </text>
</svg>
