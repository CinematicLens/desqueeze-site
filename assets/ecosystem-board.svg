<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">DeSqueeze Studio Ecosystem</title>
  <desc id="desc">Advertisement board showing the ecosystem of product lines including CineLutLiveGrade, Web Studio, iOS, Android, and Windows tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="100%" stop-color="#0c1020"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1260" cy="120" r="220" fill="#1d4ed8" opacity="0.12" filter="url(#glow)"/>
  <circle cx="220" cy="780" r="180" fill="#0ea5e9" opacity="0.08" filter="url(#glow)"/>

  <text x="100" y="135" fill="#e5e7eb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="700">
    DeSqueeze Studio Ecosystem
  </text>
  <text x="100" y="182" fill="#93c5fd" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="500">
    Live LUT and CDL grading + anamorphic de-squeeze workflows
  </text>

  <rect x="100" y="230" width="1400" height="560" rx="24" fill="#0b1220" opacity="0.65" stroke="#1f2937"/>

  <rect x="140" y="280" width="420" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="170" y="338" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="600">Flagship (Mac)</text>
  <text x="170" y="378" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">CineLutLiveGrade</text>
  <text x="170" y="415" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">On-set live grading, scopes, ProRes</text>

  <rect x="590" y="280" width="290" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="620" y="338" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Web</text>
  <text x="620" y="377" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Web Studio</text>
  <text x="620" y="414" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Free browser de-squeeze</text>

  <rect x="910" y="280" width="250" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="940" y="338" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">iOS</text>
  <text x="940" y="377" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">iPhone/iPad</text>
  <text x="940" y="414" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Anamorphic Desqueezer</text>

  <rect x="1190" y="280" width="270" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="1220" y="338" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Windows</text>
  <text x="1220" y="377" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Desktop Pro</text>
  <text x="1220" y="414" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Batch, LUT/CDL, EDL</text>

  <rect x="140" y="530" width="650" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="170" y="588" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Android Apps</text>
  <text x="170" y="627" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">DeSqueeze Studio + Anamorphic Desqueeze Pro</text>
  <text x="170" y="664" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Batch, LUT, CinemaScope, live and post workflows</text>

  <rect x="820" y="530" width="640" height="210" rx="18" fill="url(#card)" stroke="#334155"/>
  <text x="850" y="588" fill="#7dd3fc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="600">Built for filmmakers worldwide</text>
  <text x="850" y="627" fill="#f8fafc" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">One ecosystem. One workflow.</text>
  <text x="850" y="664" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Capture -> Grade -> Desqueeze -> Deliver</text>

  <rect x="100" y="815" width="380" height="8" rx="4" fill="url(#accent)"/>
</svg>
