name: Validate site

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Diagnostics (node/npm)
        shell: bash
        run: |
          set -euxo pipefail
          node -v
          npm -v
          echo "pwd: $(pwd)"
          ls -la
      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm ci
      - name: Build (Astro)
        shell: bash
        run: |
          set -euxo pipefail
          npm run build
