name: Validate site

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          npm ci
      - name: Build (Astro)
        shell: bash
        run: |
          set -euxo pipefail
          npm run build
      - name: Validate generated routes (dist/)
        shell: bash
        run: |
          set -euxo pipefail
          test -f dist/index.html
          test -f dist/guides/index.html
          test -f dist/products/index.html

      - name: Install Playwright browsers (if configured)
        if: ${{ hashFiles('playwright.config.*') != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          npx playwright install --with-deps chromium

      - name: Run Playwright tests (if present)
        if: ${{ hashFiles('playwright.config.*', 'tests/**', 'e2e/**') != '' }}
        shell: bash
        run: |
          set -euxo pipefail
          npx playwright test
