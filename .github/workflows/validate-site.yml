name: Validate site

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Static HTML checks
        run: python scripts/validate_site.py
      - name: Unit tests (validator)
        run: python -m unittest discover -s tests -p "test_validate_site.py" -v
      - name: Install dev dependencies (Playwright)
        run: pip install -r requirements-dev.txt
      - name: Install Chromium for e2e
        run: python -m playwright install chromium --with-deps
      - name: E2E click-through crawl (Playwright)
        run: pytest e2e -v
